# Benji's AI Empire — Next.js app (benjisaiempire.com apex)
# Runtime: @netlify/plugin-nextjs (Open Next adapter). Do not set output: "standalone" on Netlify builds.

[build]
  command = "npm run build"
  # publish dir is set by @netlify/plugin-nextjs — do not set publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"
  # Netlify sets CI=true by default; that breaks Next file-tracing on this app.
  CI = "false"
  # Prisma: postinstall + build script run `prisma generate`. Use Supabase transaction pooler for DATABASE_URL.

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Static files live in public/images/ and are served at /images/* by Next.js — no redirect needed.
